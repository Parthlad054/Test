<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - Team Task Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
  <main class="auth-wrap">
    <section class="card auth-card">
      
      <!-- STEP 1: Email -->
      <div id="step-email">
        <h1 style="font-size:22px">Forgot Password</h1>
        <p style="color:var(--gray-600);margin-top:4px">Enter your registered email. We'll send a 6-digit OTP.</p>
        
        <form id="form-email" style="margin-top:20px;">
          <div class="field" id="field-email">
            <label for="input-email">Email</label>
            <input class="input" type="email" id="input-email" required>
            <small class="field-error" id="error-email"></small>
          </div>
          <button type="submit" id="btn-send-otp" class="button mobile-full">
            <span>Send OTP</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
          <small class="field-error" id="error-email-form"></small>
        </form>
        
        <div style="margin-top:16px; text-align:center;">
          <a href="index.html" style="color:var(--primary); font-size:14px;">Back to Login</a>
        </div>
      </div>

      <!-- STEP 2: OTP Verification -->
      <div id="step-otp" style="display:none;">
        <h1 style="font-size:22px">Enter OTP</h1>
        <p style="color:var(--gray-600);margin-top:4px">An OTP has been sent to <b id="otp-email-display"></b></p>
        
        <form id="form-otp" style="margin-top:20px;">
          <div class="field" id="field-otp">
            <label for="input-otp">6-Digit OTP</label>
            <input class="input" type="text" id="input-otp" maxlength="6" required>
            <small class="field-error" id="error-otp"></small>
          </div>
          <button type="submit" id="btn-verify-otp" class="button mobile-full">
            <span>Verify OTP</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
          <small class="field-error" id="error-otp-form"></small>
          
          <div style="margin-top:16px; text-align:center; font-size:14px; color:var(--gray-600);">
            Didn't receive it? 
            <a href="#" id="resend-otp" style="color:var(--primary);">Resend OTP</a>
            <span id="resend-timer"></span>
          </div>
        </form>
      </div>

      <!-- STEP 3: Reset Password -->
      <div id="step-reset" style="display:none;">
        <h1 style="font-size:22px">Set New Password</h1>
        <form id="form-reset" style="margin-top:20px;">
          <div class="field" id="field-new-password">
            <label for="input-new-password">New Password</label>
            <input class="input" type="password" id="input-new-password" required>
            <small class="field-error" id="error-new-password"></small>
          </div>
          <div class="field" id="field-confirm-password">
            <label for="input-confirm-password">Confirm Password</label>
            <input class="input" type="password" id="input-confirm-password" required>
            <small class="field-error" id="error-confirm-password"></small>
          </div>
          <button type="submit" id="btn-reset" class="button mobile-full">
            <span>Reset Password</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
          <small class="field-error" id="error-reset-form"></small>
        </form>
      </div>

      <!-- SUCCESS STATE -->
      <div id="step-success" style="display:none; text-align:center;">
        <div style="margin:20px 0;">
          <svg width="48" height="48" fill="none" stroke="var(--success)" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h1 style="font-size:22px">Password Reset!</h1>
        <p style="color:var(--gray-600);margin-top:8px;">Your password has been updated successfully.</p>
        <a href="index.html" class="button mobile-full" style="margin-top:24px; text-decoration:none; display:inline-block; text-align:center;">Back to Login</a>
      </div>

    </section>
  </main>
  
  <script src="static/js/api.js"></script>
  <script src="static/js/forgot-password.js"></script>
</body>
</html>
