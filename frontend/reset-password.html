<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Team Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h2>Reset Password</h2>
        <form id="reset-password-form">
            <div class="form-group">
                <label for="token">Reset Token</label>
                <input type="text" id="token" required placeholder="From the console for testing">
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" required minlength="8">
            </div>
            <button type="submit" class="btn-primary">Reset Password</button>
            <p class="auth-switch"><a href="auth.html">Back to Login</a></p>
        </form>
        <div id="reset-message" style="display:none; margin-top: 15px; text-align: center;"></div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/reset-password.js"></script>
</body>
</html>
