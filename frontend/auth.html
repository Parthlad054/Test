<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Team Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h2>Welcome Back</h2>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <p class="auth-switch" style="text-align: right; margin-top: -10px; margin-bottom: 15px;"><a href="forgot-password.html">Forgot Password?</a></p>
            <button type="submit" class="btn-primary">Login</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="#" id="show-register">Register here</a></p>

        <form id="register-form" style="display: none;">
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" required>
            </div>
            <button type="submit" class="btn-primary">Register</button>
            <p class="auth-switch">Already have an account? <a href="#" id="show-login">Login here</a></p>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
